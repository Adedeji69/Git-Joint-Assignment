<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign Up | Swift Luxe</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

  <style>
    :root{
      --orange:#f68b1e;
      --orange-dark:#df7d10;
      --bg:#f5f5f5;
      --text:#1f1f1f;
      --muted:#6b7280;
    }

    body{
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:2.5rem 1rem;
    }

    .brand{
      color:var(--orange) !important;
      font-weight:900;
      letter-spacing:.02em;
      text-decoration:none;
    }

    .signup-card{
      background:#fff;
      border:1px solid #eee;
      border-radius:16px;
      max-width:460px;
      width:100%;
      padding:2.25rem 2rem;
    }

    .section-title{ font-weight:800; }
    .small-muted{ color:var(--muted); }

    .form-label{
      font-weight:600;
      font-size:.875rem;
      color:#374151;
      margin-bottom:.4rem;
    }

    .form-control, .form-select{
      border:1.5px solid #e5e7eb;
      border-radius:10px;
      padding:.65rem 1rem;
      font-size:.9rem;
    }

    .form-control:focus, .form-select:focus{
      border-color:var(--orange);
      box-shadow:0 0 0 3px rgba(246,139,30,.15);
    }

    .input-group .form-control{
      border-right:0;
      border-radius:10px 0 0 10px;
    }

    .input-group-text{
      background:#fff;
      border:1.5px solid #e5e7eb;
      border-left:0;
      border-radius:0 10px 10px 0;
      color:#9ca3af;
      cursor:pointer;
    }

    .input-group-text:hover{ color:var(--orange); }

    .strength-bar{
      height:5px;
      border-radius:3px;
      background:#e5e7eb;
      overflow:hidden;
      margin-top:8px;
    }

    .strength-fill{
      height:100%;
      width:0%;
      border-radius:3px;
      transition:width .3s, background .3s;
    }

    .strength-label{
      font-size:.76rem;
      font-weight:600;
      text-align:right;
      margin-top:3px;
      color:var(--muted);
    }

    .form-check-input:checked{
      background-color:var(--orange);
      border-color:var(--orange-dark);
    }

    .form-check-label{
      font-size:.85rem;
      color:#374151;
    }

    .form-check-label a{
      color:var(--orange);
      font-weight:600;
      text-decoration:none;
    }

    .form-check-label a:hover{ text-decoration:underline; }

    .btn-orange{
      background:var(--orange);
      border-color:var(--orange);
      color:#fff;
      font-weight:700;
      border-radius:999px;
      padding:.75rem;
    }

    .btn-orange:hover{
      background:var(--orange-dark);
      border-color:var(--orange-dark);
      color:#fff;
    }

    .divider-text{
      color:var(--muted);
      font-size:.8rem;
      position:relative;
    }

    .divider-text::before, .divider-text::after{
      content:'';
      position:absolute;
      top:50%;
      width:40%;
      height:1px;
      background:#e5e7eb;
    }

    .divider-text::before{ right:100%; margin-right:12px; }
    .divider-text::after{ left:100%; margin-left:12px; }

    .btn-social{
      background:#fff;
      border:1.5px solid #e5e7eb;
      border-radius:999px;
      color:#374151;
      font-size:.85rem;
      font-weight:600;
      padding:.6rem;
    }

    .btn-social:hover{
      border-color:var(--orange);
      color:var(--orange);
    }

    .signin-text{ color:var(--muted); font-size:.85rem; }

    .signin-link{
      color:var(--orange);
      font-weight:700;
      text-decoration:none;
    }

    .signin-link:hover{ color:var(--orange-dark); }

    .invalid-feedback{ font-size:.75rem; }
    .form-control.is-invalid{ border-color:#dc3545; }
  </style>
</head>
<body>

  <div class="signup-card">

    <a href="#" class="brand fs-3 d-inline-block mb-4">Swift Luxe</a>

    <h2 class="section-title mb-1">Create your account</h2>
    <p class="small-muted mb-4">Join Swift Luxe and start saving on daily deals.</p>

    <form id="signupForm" novalidate>

      <div class="row g-2 mb-3">
        <div class="col-6">
          <label for="firstName" class="form-label">First name</label>
          <input type="text" class="form-control" id="firstName" placeholder="John" required>
          <div class="invalid-feedback">Required.</div>
        </div>
        <div class="col-6">
          <label for="lastName" class="form-label">Last name</label>
          <input type="text" class="form-control" id="lastName" placeholder="Doe" required>
          <div class="invalid-feedback">Required.</div>
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" required autocomplete="email">
        <div class="invalid-feedback">Enter a valid email address.</div>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label">Phone number</label>
        <input type="tel" class="form-control" id="phone" placeholder="Enter your phone number" required>
        <div class="invalid-feedback">Enter a valid phone number.</div>
      </div>

      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <div class="input-group">
          <input type="password" class="form-control" id="password" placeholder="At least 8 characters" required autocomplete="new-password">
          <span class="input-group-text" id="togglePassword">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </span>
        </div>
        <div class="strength-bar">
          <div class="strength-fill" id="strengthFill"></div>
        </div>
        <div class="strength-label" id="strengthLabel"></div>
        <div class="invalid-feedback d-block" id="passwordError" style="display:none!important;"></div>
      </div>

      <div class="mb-3">
        <label for="confirmPassword" class="form-label">Confirm password</label>
        <div class="input-group">
          <input type="password" class="form-control" id="confirmPassword" placeholder="Repeat your password" required autocomplete="new-password">
          <span class="input-group-text" id="toggleConfirm">
            <i class="bi bi-eye" id="eyeIconConfirm"></i>
          </span>
        </div>
        <div class="invalid-feedback" id="confirmError">Passwords do not match.</div>
      </div>

      <div class="mb-4 form-check">
        <input type="checkbox" class="form-check-input" id="terms" required>
        <label class="form-check-label" for="terms">
          I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>
        </label>
        <div class="invalid-feedback">You must agree before continuing.</div>
      </div>

      <button type="submit" class="btn btn-orange w-100 mb-4">Create Account</button>

      <div class="text-center mb-4">
        <span class="divider-text">or sign up with</span>
      </div>

      <div class="row g-2 mb-4">
        <div class="col-6">
          <button type="button" class="btn btn-social w-100 d-flex align-items-center justify-content-center gap-2">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Google
          </button>
        </div>
        <div class="col-6">
          <button type="button" class="btn btn-social w-100 d-flex align-items-center justify-content-center gap-2">
            <i class="bi bi-facebook" style="color:#1877f2;"></i>
            Facebook
          </button>
        </div>
      </div>

      <p class="text-center signin-text mb-0">
        Already have an account? <a href="#" class="signin-link">Sign in</a>
      </p>

    </form>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function toggleVisibility(toggleId, inputId, iconId) {
      document.getElementById(toggleId).addEventListener('click', function () {
        const input = document.getElementById(inputId);
        const icon  = document.getElementById(iconId);
        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.replace('bi-eye', 'bi-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.replace('bi-eye-slash', 'bi-eye');
        }
      });
    }

    toggleVisibility('togglePassword', 'password', 'eyeIcon');
    toggleVisibility('toggleConfirm', 'confirmPassword', 'eyeIconConfirm');

    document.getElementById('password').addEventListener('input', function () {
      const val = this.value;
      const fill  = document.getElementById('strengthFill');
      const label = document.getElementById('strengthLabel');

      let score = 0;
      if (val.length >= 8)          score++;
      if (/[A-Z]/.test(val))        score++;
      if (/[0-9]/.test(val))        score++;
      if (/[^A-Za-z0-9]/.test(val)) score++;

      const levels = [
        { pct: '0%',   color: 'transparent', text: '' },
        { pct: '25%',  color: '#dc3545',      text: 'Weak' },
        { pct: '50%',  color: '#f68b1e',      text: 'Fair' },
        { pct: '75%',  color: '#ffc107',      text: 'Good' },
        { pct: '100%', color: '#198754',      text: 'Strong' },
      ];

      const lvl = val.length === 0 ? levels[0] : levels[score];
      fill.style.width      = lvl.pct;
      fill.style.background = lvl.color;
      label.textContent     = lvl.text;
      label.style.color     = lvl.color;
    });

    document.getElementById('signupForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const form     = this;
      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirmPassword');
      const pwErr    = document.getElementById('passwordError');

      if (password.length < 8) {
        pwErr.textContent = 'Password must be at least 8 characters.';
        pwErr.style.display = 'block';
        document.getElementById('password').classList.add('is-invalid');
      } else {
        pwErr.style.display = 'none';
        document.getElementById('password').classList.remove('is-invalid');
      }

      if (confirm.value !== password) {
        confirm.classList.add('is-invalid');
      } else {
        confirm.classList.remove('is-invalid');
      }

      if (!form.checkValidity() || password.length < 8 || confirm.value !== password) {
        form.classList.add('was-validated');
        return;
      }

      alert('Account created successfully!');
    });
  </script>

</body>
</html>
